<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="1180" height="520" fill="#12151a"/>
  <text x="40" y="52" fill="#e9eff7" font-size="26" font-weight="700" font-family="'Spectral',Georgia,serif">Three controls, because each fails differently</text>

  <!-- Layer 1 -->
  <rect x="40" y="96" width="1100" height="112" rx="10" fill="#1a1f28" stroke="#272e39" stroke-width="1.5"/>
  <rect x="40" y="96" width="6" height="112" rx="3" fill="#c9a462" fill-opacity="0.5"/>
  <text x="86" y="168" fill="#c9a462" font-size="44" font-weight="700" font-family="'Spectral',Georgia,serif">1</text>
  <text x="150" y="140" fill="#e9eff7" font-size="21" font-weight="600">Fence the untrusted data, in the prompt</text>
  <text x="150" y="168" fill="#c3cbd8" font-size="15">Mark the row as evidence to analyze, never instruction to follow. Forbid trusting approval claims inside it.</text>
  <text x="150" y="192" fill="#8a6f52" font-size="12" letter-spacing="0.1em" font-family="'IBM Plex Mono',Consolas,monospace">FAILS WHEN:</text>
  <text x="258" y="192" fill="#707d8f" font-size="13.5" font-family="'IBM Plex Mono',Consolas,monospace">a model is talked past it. Weakest layer, still necessary.</text>
  <text x="1120" y="122" text-anchor="end" fill="#8a6f52" font-size="12" letter-spacing="0.14em" font-family="'IBM Plex Mono',Consolas,monospace">ASKS NICELY</text>

  <!-- Layer 2 -->
  <rect x="40" y="224" width="1100" height="112" rx="10" fill="#1a1f28" stroke="#272e39" stroke-width="1.5"/>
  <rect x="40" y="224" width="6" height="112" rx="3" fill="#c9a462" fill-opacity="0.8"/>
  <text x="86" y="296" fill="#c9a462" font-size="44" font-weight="700" font-family="'Spectral',Georgia,serif">2</text>
  <text x="150" y="268" fill="#e9eff7" font-size="21" font-weight="600">A deterministic pre-check, in the query engine</text>
  <text x="150" y="296" fill="#c3cbd8" font-size="15">A keyword scan computes an injection flag before the model sees the row. The model cannot influence it.</text>
  <text x="150" y="320" fill="#8a6f52" font-size="12" letter-spacing="0.1em" font-family="'IBM Plex Mono',Consolas,monospace">FAILS WHEN:</text>
  <text x="258" y="320" fill="#707d8f" font-size="13.5" font-family="'IBM Plex Mono',Consolas,monospace">the payload is encoded. Plaintext only.</text>
  <text x="1120" y="250" text-anchor="end" fill="#c9a462" font-size="12" letter-spacing="0.14em" font-family="'IBM Plex Mono',Consolas,monospace">CAN'T BE TALKED OUT OF IT</text>

  <!-- Layer 3 -->
  <rect x="40" y="352" width="1100" height="112" rx="10" fill="#1a1f28" stroke="#272e39" stroke-width="1.5"/>
  <rect x="40" y="352" width="6" height="112" rx="3" fill="#c9a462"/>
  <text x="86" y="424" fill="#c9a462" font-size="44" font-weight="700" font-family="'Spectral',Georgia,serif">3</text>
  <text x="150" y="396" fill="#e9eff7" font-size="21" font-weight="600">Never let the model hand back the evidence</text>
  <text x="150" y="424" fill="#c3cbd8" font-size="15">The model returns only a verdict. The workflow reconstructs every field from the original source row.</text>
  <text x="150" y="448" fill="#8a6f52" font-size="12" letter-spacing="0.1em" font-family="'IBM Plex Mono',Consolas,monospace">RESULT:</text>
  <text x="230" y="448" fill="#707d8f" font-size="13.5" font-family="'IBM Plex Mono',Consolas,monospace">a manipulated model's blast radius is one enum value. Containment.</text>
  <text x="1120" y="378" text-anchor="end" fill="#e9eff7" font-size="12" letter-spacing="0.14em" font-family="'IBM Plex Mono',Consolas,monospace">CAPS THE DAMAGE</text>
</svg>
